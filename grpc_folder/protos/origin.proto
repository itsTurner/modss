



syntax = "proto3";

package origin;

//Non-exhaustive list of possible video compression types to support
enum VideoCodec {
    H264 = 0;
    H265 = 1;
    VP8 = 2;
    VP9 = 3;
    AV1 = 4;
}

enum AudioCodec {
    AAC = 0;
    MP3 = 1;
}

enum Resolution {
    p1080 = 0;
    p720 = 1;
    p480 = 2;
    p360 = 3;
    p240 = 4;
}

enum FrameRate {
    fps30 = 0;
    fps60 = 1;
}

enum Format {
    MP4 = 0;
    HLS = 1;
}


service Origin {

    //PoP to Origin RPCs
    rpc ingest_video_rpc (stream ingest_video_request)   returns (stream ingest_video_response) {}

    //Should I return a stream of ACKs to the PoP?
    //Like ACK each message? Or wait until a threshold is met to ACK multiple?
    //Probably a stream of ACKs TBH

        //"The two streams operate independently"
        //Clients and servers can read and write in whatever order they like
        //Can read one the write one
        //The order of messages in each stream is preserved


    rpc fetch_chunk_rpc (stream fetch_chunk_request) returns (stream fetch_chunk_response) {}

}

//Origin does video transcoding, so maybe string indicating video protocol type received?
//SRT for client to PoP

//PoP to Origin
//Format of "video_data" param is a buffer of byes in the specified format
message ingest_video_request {
    int32 streamer_id = 1;
    Format video_format = 2; 
    VideoCodec video_codec = 3; //Compression type
    AudioCodec audio_codec = 4;
    bytes video_data = 5;   //Max is 4MB by default, configurable though
    bool enable_ml_censorship = 6; //Example flag that can be set by streamer
    bool enable_watermark = 7;
    Resolution video_res = 8; //1080, 720, 480, 360, or 240
    FrameRate frame_rate = 9; //30, 60fps
    int32 video_bitrate_mbps = 10;
    int32 audio_bitrate_kbps = 11;
}

message ingest_video_response {
    bool success = 1;
    string error = 2;
}

message fetch_chunk_request {
    int32 streamer_id = 1;
    int32 chunk_id = 2;
}

message fetch_chunk_response {
    bool success = 1;
    string error = 2;
    bytes chunk_data = 3;
}